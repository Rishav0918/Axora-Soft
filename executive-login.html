<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Executive Login | Rishav Software</title>
  <link rel="stylesheet" href="executive-login.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>

<body>
  <div class="admin-login-container">
    <div class="admin-login-card" data-aos="zoom-in">
      <div class="admin-logo">
        <h1>🔐 Executive Panel</h1>
      </div>
      
      <h2>Executive Login</h2>
      <p class="login-subtitle">Enter your credentials to access the executive workspace</p>

      <form onsubmit="handleExecutiveLogin(event)">
        <div class="form-group">
          <label for="exec-id">Executive ID</label>
          <input type="text" id="exec-id" name="id" required placeholder="Enter your executive ID">
        </div>

        <div class="form-group">
          <label for="exec-password">Password</label>
          <input type="password" id="exec-password" name="password" required placeholder="Enter password">
        </div>

        <button type="submit" class="btn-login">Login</button>
      </form>

      <a href="index.html" class="btn-back">← Back to Home</a>
    </div>
  </div>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ once: true });

    function handleExecutiveLogin(event) {
      event.preventDefault();
      const id = document.getElementById('exec-id').value;
      const password = document.getElementById('exec-password').value;
      const execs = JSON.parse(localStorage.getItem('executives') || '{}');
      if (execs[id] && execs[id].password === password) {
        sessionStorage.setItem('isExecutive', 'true');
        sessionStorage.setItem('executiveId', id);
        alert('Login successful!');
        window.location.href='executive.html';
      } else {
        alert('Invalid credentials. Please try again.');
      }
    }
  </script>
</body>
</html>
