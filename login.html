<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Rishav Software</title>

  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>

<body>
  <div class="login-container">
    <div class="login-card" data-aos="zoom-in">
      <!-- Login Form -->
      <div id="login-form" class="form-container">
        <h2>Welcome Back 👋</h2>
        <p>Login to continue</p>
        <form onsubmit="handleLogin(event)">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>
        <p class="toggle-text">
          <a href="#" onclick="forgotPassword()">Forgot Password?</a><br>
          Don't have an account? <a href="#" onclick="toggleForm(event)">Sign Up</a>
        </p>
        <p style="margin-top:20px;color:#000;">Are you an executive? <a href="executive-login.html" style="color:#007bff;">Executive Login</a></p>
        <a href="index.html" class="back-home">← Back to Home</a>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-form" class="form-container" style="display:none;">
        <h2>Create Account 🔐</h2>
        <p>Join us today</p>
        <form onsubmit="handleSignUp(event)">
          <input type="text" id="signup-name" placeholder="Full Name" required />
          <input type="email" id="signup-email" placeholder="Email" required />
          <input type="password" id="signup-password" placeholder="Password" required />
          <input type="password" id="signup-confirm" placeholder="Confirm Password" required />
          <button type="submit">Create Account</button>
        </form>
        <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForm(event)">Login</a></p>
        <p style="margin-top:20px;color:#000;">Are you an executive? <a href="executive-login.html" style="color:#007bff;">Executive Login</a></p>
<a href="index.html" class="back-home">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init({ once: true });

    function toggleForm(event) {
      event.preventDefault();
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      
      if (loginForm.style.display === 'none') {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
      }
    }

    function forgotPassword() {
      const email = prompt('Enter your email address to reset password:');
      if (email) {
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        if (users[email]) {
          const newPassword = prompt('Enter new password:');
          if (newPassword && newPassword.length >= 6) {
            users[email].password = newPassword;
            localStorage.setItem('users', JSON.stringify(users));
            alert('Password reset successfully! You can now login with your new password.');
          } else {
            alert('Password must be at least 6 characters long.');
          }
        } else {
          alert('Email not found. Please check your email or sign up.');
        }
      }
    }

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      // Get registered users
      const users = JSON.parse(localStorage.getItem('users') || '{}');
      
      if (users[email] && users[email].password === password) {
        // Store user login info
        sessionStorage.setItem('userEmail', email);
        sessionStorage.setItem('userName', users[email].name);
        sessionStorage.setItem('isLoggedIn', 'true');
        
        // Transfer guest cart to user cart if exists
        const guestCartKey = 'cart-guest@example.com';
        const userCartKey = `cart-${email}`;
        const guestCart = localStorage.getItem(guestCartKey);
        if (guestCart) {
          const existingUserCart = localStorage.getItem(userCartKey);
          let userCart = existingUserCart ? JSON.parse(existingUserCart) : [];
          const guestItems = JSON.parse(guestCart);
          // Merge carts (simple merge, could handle duplicates better)
          userCart = userCart.concat(guestItems);
          localStorage.setItem(userCartKey, JSON.stringify(userCart));
          localStorage.removeItem(guestCartKey);
        }
        
        alert('Login successful!');
        window.location.href = 'dashboard.html';
      } else {
        if (users[email]) {
          alert('Invalid password. Please try again.');
        } else {
          alert('User not exist. Please sign up.');
          toggleForm(event); // Switch to signup form
        }
      }
    }

    function handleSignUp(event) {
      event.preventDefault();
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      
      if (password !== confirm) {
        alert('Passwords do not match!');
        return;
      }
      
      // Get existing users
      const users = JSON.parse(localStorage.getItem('users') || '{}');
      
      if (users[email]) {
        alert('User already exists! Please login instead.');
        toggleForm(event); // Switch to login form
        return;
      }
      
      // Add new user
      users[email] = { name, password };
      localStorage.setItem('users', JSON.stringify(users));
      
      // Auto-login
      sessionStorage.setItem('userName', name);
      sessionStorage.setItem('userEmail', email);
      sessionStorage.setItem('isLoggedIn', 'true');
      
      alert('Account created successfully! You are now logged in.');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
